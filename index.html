<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Maite ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050005; /* Fondo casi negro rosado */
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            perspective: 1000px; /* Para efecto 3D al presionar */
        }

        /* Contenedor del Corazón Principal para centrarlo y detecta clics */
        .heart-container {
            position: relative;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.1s ease;
        }

        .heart-container:active {
            transform: scale(0.9) rotateX(10deg); /* Efecto de presionado */
        }

        /* El Corazón Principal */
        .main-heart {
            position: relative;
            width: 120px;
            height: 120px;
            background-color: #ff2e63;
            transform: rotate(-45deg) scale(0);
            animation: explodeBuild 3s ease-in-out forwards;
            box-shadow: 0 0 50px rgba(255, 46, 99, 0.7);
        }

        .main-heart::before,
        .main-heart::after {
            content: "";
            position: absolute;
            width: 120px;
            height: 120px;
            background-color: #ff2e63;
            border-radius: 50%;
        }

        .main-heart::before { top: -60px; left: 0; }
        .main-heart::after { left: 60px; top: 0; }

        /* Animación de Entrada del Corazón */
        @keyframes explodeBuild {
            0% { transform: rotate(-45deg) scale(0); filter: brightness(2) blur(5px); }
            40% { transform: rotate(-45deg) scale(1.6); filter: brightness(1.2) blur(0); }
            60% { transform: rotate(-45deg) scale(0.8); }
            80% { transform: rotate(-45deg) scale(1.1); }
            100% { transform: rotate(-45deg) scale(1); }
        }

        /* Estilo para el nombre "Maite" que sale al hacer clic */
        .name-float {
            position: absolute;
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff2e63, 0 0 20px #ff2e63;
            pointer-events: none;
            z-index: 15;
            animation: floatName 2s ease-out forwards;
            white-space: nowrap;
        }

        @keyframes floatName {
            0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50px) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -150px) scale(1); }
        }

        /* --- Mini Corazones CSS (Más Claros) --- */
        .mini-heart-css {
            position: absolute;
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            animation: floatBackground 6s linear infinite;
        }

        .mini-heart-css .heart-shape {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: rgba(255, 255, 255, 0.85); /* Color blanco/rosado muy claro */
            transform: rotate(-45deg);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .mini-heart-css .heart-shape::before,
        .mini-heart-css .heart-shape::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
        }

        .mini-heart-css .heart-shape::before { top: -10px; left: 0; }
        .mini-heart-css .heart-shape::after { left: 10px; top: 0; }

        /* La letra M dentro del mini corazón */
        .mini-heart-css .letter-m {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            top: 2px; /* Ajuste fino para centrar visualmente en el rombo rotado */
            color: #ff2e63; /* Color de la letra contrastante */
            font-size: 16px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            z-index: 2;
        }

        @keyframes floatBackground {
            0% { transform: translateY(110vh) translateX(0) rotate(0deg) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) translateX(50px) rotate(360deg) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="heart-container" id="mainHeartContainer">
        <div class="main-heart"></div>
    </div>

    <script>
        const heartContainer = document.getElementById('mainHeartContainer');

        // Función para crear el nombre Maite al hacer clic
        heartContainer.addEventListener('click', (e) => {
            const name = document.createElement('div');
            name.classList.add('name-float');
            name.innerText = 'Maite';

            // Posicionar el nombre en el centro del corazón
            // Usamos coordenadas relativas al contenedor
            name.style.left = '50%';
            name.style.top = '50%';

            heartContainer.appendChild(name);

            // Eliminar el elemento después de la animación
            setTimeout(() => {
                name.remove();
            }, 2000);
            
            // Opcional: Pequeña explosión extra de mini corazones al hacer clic
            for(let i=0; i<3; i++) {
                createMiniHeart(true);
            }
        });

        // Función para crear los mini corazones CSS claros con la M
        function createMiniHeart(isBurst = false) {
            const container = document.createElement('div');
            container.classList.add('mini-heart-css');
            
            // Estructura interna: El corazón y la letra
            container.innerHTML = `
                <div class="heart-shape"></div>
                <div class="letter-m">m</div>
            `;
            
            // Posición horizontal aleatoria
            container.style.left = Math.random() * 100 + "vw";
            
            // Variación de tamaño aleatoria
            const scale = Math.random() * 0.5 + 0.7; // Entre 0.7 y 1.2
            container.style.transform = `scale(${scale})`;

            // Duración y retraso aleatorio para la animación de fondo
            const duration = (Math.random() * 4 + 4) + "s"; // Entre 4 y 8s
            container.style.animationDuration = duration;

            if (isBurst) {
                // Si es una explosión por clic, aparecen cerca del corazón y suben rápido
                container.style.left = (50 + (Math.random() * 20 - 10)) + "vw";
                container.style.top = "50vh";
                container.style.animation = 'floatName 1.5s ease-out forwards';
                // Cambiamos el color para el burst
                container.querySelector('.heart-shape').style.backgroundColor = 'white';
            }

            document.body.appendChild(container);

            // Limpiar el DOM cuando termina la animación larga
            setTimeout(() => {
                container.remove();
            }, 8000);
        }

        // Crear corazones de fondo continuamente (más lento para no saturar)
        setInterval(() => createMiniHeart(false), 600);
    </script>
</body>
</html>
